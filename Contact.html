<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#007aff">
<title>Customer Care Contact</title>

<style>
:root{
  --bg1:#f9f9fb;
  --bg2:#eef1ff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:calc(20px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));
  min-height:100vh;
  animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

h2{
  margin:10px 0;
  font-weight:700;
}

.clipboard{
  width:100%;
  max-width:420px;
  margin-top:15px;
  padding:16px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 4px 18px rgba(0,0,0,0.08);
  text-align:center;
  font-weight:600;
  font-size:17px;
  animation:floatUp 0.8s ease;
}

@keyframes floatUp{
  from{transform:translateY(30px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

button{
  width:100%;
  max-width:420px;
  margin-top:14px;
  padding:16px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform 0.15s ease;
}

button:active{
  transform:scale(0.95);
}

.copy-btn{
  background:linear-gradient(135deg,#007aff,#00d4ff);
  color:#fff;
}

.open-btn{
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:#fff;
}

/* Ripple effect */
button::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  opacity:0;
  pointer-events:none;
}

button:active::after{
  width:200px;
  height:200px;
  opacity:1;
  transition:0s;
}

.divider{
  width:100%;
  max-width:420px;
  height:1px;
  background:#d1d1d6;
  margin:24px 0;
}

.video-card{
  width:100%;
  max-width:420px;
  padding:6px;
  border-radius:22px;
  background:linear-gradient(270deg,#ff6a00,#ee0979,#007aff,#32cd32);
  background-size:400% 400%;
  animation:gradientMove 8s ease infinite;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

video{
  width:100%;
  border-radius:18px;
  display:block;
  background:black;
}

.toast{
  position:fixed;
  top:calc(40px + env(safe-area-inset-top));
  left:50%;
  transform:translateX(-50%);
  background:#13a751;
  color:white;
  padding:14px 20px;
  border-radius:18px;
  opacity:0;
  transition:opacity 0.3s ease;
  max-width:92%;
  text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<h2>Customer Care Contact</h2>

<div class="clipboard" id="clipContent">@iNDiTeam</div>

<button class="copy-btn" onclick="copyContact()">Copy Contact</button>
<button class="open-btn" onclick="openTelegramSmart()">Open Direct Chat</button>

<p style="margin-top:18px;font-weight:600;">- OR -</p>
<p style="font-size:15px;">Email us - HelloPlayBoys@gmail.com</p>

<div class="divider"></div>

<div class="video-card">
  <video
    src="https://himanpayment2checkout.pages.dev/INDIA.mp4"
    poster="https://himanpayment2checkout.pages.dev/IN.jpg"
    preload="metadata"
    playsinline
    webkit-playsinline>
  </video>
</div>

<div id="toast" class="toast"></div>

<script>
const toast=document.getElementById("toast");

function showToast(msg){
  toast.textContent=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),4000);
}

function copyContact(){
  navigator.clipboard.writeText("@iNDiTeam").then(()=>{
    showToast("Telegram ID @iNDiTeam copied successfully!");
  });
}

/* ==============================
   SMART MULTI-LAYER DETECTION
   ============================== */

function openTelegramSmart(){

  const username="iNDiTeam";
  const webUrl="https://t.me/"+username;
  const chromePlay="https://play.google.com/store/apps/details?id=com.android.chrome";
  const telegramPlay="https://play.google.com/store/apps/details?id=org.telegram.messenger";

  const isAndroid=/Android/i.test(navigator.userAgent);
  let appOpened=false;

  function markOpened(){ appOpened=true; }

  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="hidden"){ markOpened(); }
  });

  window.addEventListener("blur",markOpened);

  if(!isAndroid){
    window.location.href=webUrl;
    return;
  }

  /* 1️⃣ Try Telegram App */
  const tgIframe=document.createElement("iframe");
  tgIframe.style.display="none";
  tgIframe.src="tg://resolve?domain="+username;
  document.body.appendChild(tgIframe);

  setTimeout(()=>{

    if(appOpened) return;

    /* 2️⃣ Try Chrome Intent */
    const intent="intent://t.me/"+username+"#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href=intent;

    setTimeout(()=>{

      if(appOpened) return;

      /* 3️⃣ Try googlechrome scheme */
      window.location.href="googlechrome://navigate?url="+webUrl;

      setTimeout(()=>{

        if(appOpened) return;

        /* 4️⃣ Open Web */
        window.location.href=webUrl;

        setTimeout(()=>{

          if(appOpened) return;

          /* 5️⃣ Final fallback → Play Store */
          window.location.href=telegramPlay;

        },2000);

      },1500);

    },1800);

  },1200);
}
</script>

</body>
</html>
